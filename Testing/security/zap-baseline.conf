# ZAP baseline policy for WordMaster.
#
# The default runner uses zap-baseline.py with -I, so WARN-level passive
# findings are reported without failing the command. Set ZAP_STRICT=true when
# a caller should fail on WARN/FAIL findings.
#
# To tune a known finding, add an alert rule using ZAP baseline syntax:
# <alert-id> <level> <optional reason>
#
# Valid levels include IGNORE, INFO, WARN, and FAIL.
