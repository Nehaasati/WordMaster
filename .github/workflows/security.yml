name: Security

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Base URL for the deployed app
        required: false
        type: string
  schedule:
    - cron: "30 2 * * *"

jobs:
  zap-full:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || vars.RENDER_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate target URL
        run: |
          if [ -z "${TARGET_URL}" ]; then
            echo "TARGET_URL is empty. Set the RENDER_BASE_URL repository variable or provide a manual workflow input."
            exit 1
          fi

      - name: Run ZAP full scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-full-report
          cmd_options: "-a"

      - name: Publish workflow summary
        if: always()
        run: |
          echo "## Security Run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scan type: ZAP full scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target URL: ${TARGET_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: manual full scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: zap-full-report" >> "$GITHUB_STEP_SUMMARY"

  multiplayer-abuse:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || vars.RENDER_BASE_URL }}
      FAIL_ON_FINDINGS: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate target URL
        run: |
          if [ -z "${TARGET_URL}" ]; then
            echo "TARGET_URL is empty. Set the RENDER_BASE_URL repository variable or provide a manual workflow input."
            exit 1
          fi

      - name: Create results directory
        run: mkdir -p Testing/security/results

      - name: Run multiplayer abuse checks
        run: node Testing/security/multiplayer-abuse.js
        env:
          BASE_URL: ${{ env.TARGET_URL }}
          FAIL_ON_FINDINGS: ${{ env.FAIL_ON_FINDINGS }}

      - name: Publish workflow summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Multiplayer Security Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target URL: ${TARGET_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: multiplayer-abuse-report" >> "$GITHUB_STEP_SUMMARY"
          if [ -f Testing/security/results/multiplayer-abuse-report.md ]; then
            cat Testing/security/results/multiplayer-abuse-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload multiplayer security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multiplayer-abuse-report
          path: Testing/security/results/**
          if-no-files-found: ignore
