name: .NET

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # Install .NET 10 SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Cache NuGet
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore

      # Node 24
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            Testing/package-lock.json

      # Install frontend deps
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build frontend 
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Publish backend
      - name: Publish backend
        run: dotnet publish backend/backend.csproj -c Release -o out --no-restore

      # Upload backend artifact
      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-publish
          path: out/

      # Upload frontend (NOT backend/wwwroot)
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: frontend

      # Validate Docker build
      - name: Validate Docker build
        run: docker build -t wordmaster-ci .
  
  tests:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [ api,unit ]   # UI disabled for now

    steps:
      - uses: actions/checkout@v4

      # Download frontend dist
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: Testing/package-lock.json

      # Install API test deps
      - name: Install system test dependencies
        if: ${{ matrix.suite == 'api' }}
        working-directory: Testing/
        run: npm ci
      
      # unit test
      - name: Run unit tests

        if: ${{ matrix.suite == 'unit' }}

        run: dotnet test --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults
 
      # Run API tests
      - name: Run API tests
        if: ${{ matrix.suite == 'api' }}
        run: |
          dotnet run --project backend/backend.csproj --urls http://127.0.0.1:5024 &
          sleep 8
          cd Testing/
          npm run test:api:ci

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: |
            TestResults/**
            Testing/test-results/**
          if-no-files-found: ignore

  report:
    needs: tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: artifacts/
          merge-multiple: true

      - name: Publish pipeline summary
        run: |
          echo "## CI Rapport" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build-jobb: klart" >> "$GITHUB_STEP_SUMMARY"
          echo "- Testmatris: endast API körs just nu" >> "$GITHUB_STEP_SUMMARY"
          echo "- Nedladdade artefakter:" >> "$GITHUB_STEP_SUMMARY"
          find artifacts -type f | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"