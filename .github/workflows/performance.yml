name: Performance

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target_url:
        description: Base URL for the deployed app
        required: false
        type: string
      profile:
        description: k6 profile to run
        required: true
        default: load
        type: choice
        options:
          - load
          - stress
  schedule:
    - cron: "0 2 * * *"

jobs:
  k6-smoke:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      TARGET_URL: http://127.0.0.1:5024
      TEST_PROFILE: smoke

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start backend
        run: |
          dotnet run --project backend/backend.csproj --urls ${TARGET_URL} &
          for i in {1..30}; do
            if curl --fail --silent "${TARGET_URL}/api/health" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time."
          exit 1

      - name: Run k6 smoke profile
        run: >
          k6 run
          --env BASE_URL=${TARGET_URL}
          --env TEST_PROFILE=${TEST_PROFILE}
          Testing/k6/wordmaster-multiplayer.js

  k6-deployed:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || vars.RENDER_BASE_URL }}
      TEST_PROFILE: ${{ github.event.inputs.profile || 'load' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate target URL
        run: |
          if [ -z "${TARGET_URL}" ]; then
            echo "TARGET_URL is empty. Set the RENDER_BASE_URL repository variable or provide a manual workflow input."
            exit 1
          fi

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Create results directory
        run: mkdir -p Testing/k6/results

      - name: Run k6 ${TEST_PROFILE} profile
        run: >
          k6 run
          --env BASE_URL=${TARGET_URL}
          --env TEST_PROFILE=${TEST_PROFILE}
          --summary-export Testing/k6/results/summary.json
          Testing/k6/wordmaster-multiplayer.js

      - name: Publish workflow summary
        if: always()
        run: |
          echo "## Performance Run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target URL: ${TARGET_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile: ${TEST_PROFILE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Script: Testing/k6/wordmaster-multiplayer.js" >> "$GITHUB_STEP_SUMMARY"
          if [ -f Testing/k6/results/summary.json ]; then
            echo "- Summary export: Testing/k6/results/summary.json" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.run_id }}
          path: Testing/k6/results/**
          if-no-files-found: ignore
